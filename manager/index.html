<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión | Acceso Socio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white">

    <div id="app-root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-500 mx-auto mb-4"></div>
                <p class="text-slate-400 font-mono text-xs uppercase tracking-widest">Verificando estado del servicio...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtPXuvsDuLDkpIJBlEEHFll6N-NofQ3bI",
            authDomain: "prestamos-c97ed.firebaseapp.com",
            projectId: "prestamos-c97ed",
            storageBucket: "prestamos-c97ed.firebasestorage.app",
            messagingSenderId: "511457800969",
            appId: "1:511457800969:web:18b8e97383fdb630b319d8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Capturar el Tenant ID de la URL (?tenant=ID)
        const urlParams = new URLSearchParams(window.location.search);
        const tenantId = urlParams.get('tenant');

        if (!tenantId) {
            document.getElementById('app-root').innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 text-center">
                    <div class="bg-red-500/10 border border-red-500/20 p-8 rounded-3xl max-w-sm">
                        <h2 class="text-red-500 font-black mb-2 uppercase text-sm">Error de Configuración</h2>
                        <p class="text-slate-400 text-xs">No se detectó un identificador de socio en la URL.</p>
                    </div>
                </div>
            `;
        } else {
            // Referencia al documento de control público del socio
            const adminDocRef = doc(db, 'artifacts', tenantId, 'public', 'data', 'usuarios', 'admin_data');
            
            // Suscripción en tiempo real
            onSnapshot(adminDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Lógica de Bloqueo: Mantenimiento o Suspendido
                    if (data.estadoTenant === 'Mantenimiento' || data.estadoTenant === 'Suspendido') {
                        const htmlDeBloqueo = data.htmlMantenimiento;

                        if (htmlDeBloqueo && htmlDeBloqueo.trim() !== "") {
                            // BLOQUEO TOTAL: Sobrescribir el documento completo con el HTML personalizado
                            document.open();
                            document.write(htmlDeBloqueo);
                            document.close();
                            window.stop(); // Detener cualquier otro script
                        } else {
                            // Diseño de respaldo si el campo está vacío en Firebase
                            document.body.innerHTML = `
                                <div style="background:#0b1120;color:white;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:sans-serif;padding:20px;">
                                    <div style="background:rgba(245,158,11,0.1);padding:40px;border-radius:40px;border:1px solid rgba(245,158,11,0.3);max-width:450px;box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
                                        <div style="font-size:70px;margin-bottom:20px;">🛠️</div>
                                        <h1 style="font-size:22px;font-weight:900;text-transform:uppercase;margin-bottom:15px;color:#f59e0b;letter-spacing:1px;">Mantenimiento Programado</h1>
                                        <p style="color:#94a3b8;font-size:14px;line-height:1.6;margin-bottom:25px;">
                                            Estamos realizando mejoras técnicas en la plataforma. El acceso estará disponible en breve.
                                        </p>
                                        <div style="background:#1e293b;padding:12px;border-radius:12px;color:#cbd5e1;font-size:11px;font-weight:bold;text-transform:uppercase;display:inline-block;padding-left:25px;padding-right:25px;">
                                            Estado: Sincronizando Servidores
                                        </div>
                                    </div>
                                    <p style="margin-top:30px;color:#475569;font-size:10px;text-transform:uppercase;letter-spacing:2px;">ProDigital Support Management</p>
                                </div>
                            `;
                        }
                    } else {
                        // El servicio está ACTIVO
                        renderApp(data);
                    }
                }
            }, (error) => {
                console.error("Error en tiempo real:", error);
            });
        }

        // Función para renderizar la aplicación normal cuando el estado es Activo
        function renderApp(adminData) {
            const root = document.getElementById('app-root');
            root.innerHTML = `
                <div class="p-4 md:p-8 max-w-6xl mx-auto">
                    <header class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50 shadow-xl">
                        <div>
                            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">${adminData.nombreEmpresa || 'Gestión de Préstamos'}</h1>
                            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-1">Panel Operativo de Socio</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex flex-col items-end">
                                <span class="text-[9px] font-bold text-slate-500 uppercase">Estado Global</span>
                                <span class="text-emerald-400 font-black text-xs uppercase tracking-widest flex items-center gap-2">
                                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Activo
                                </span>
                            </div>
                        </div>
                    </header>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50">
                            <span class="text-slate-500 text-[10px] font-bold uppercase">Cartera Total</span>
                            <div class="text-3xl font-black mt-1 text-white">₡0.00</div>
                        </div>
                        <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50">
                            <span class="text-slate-500 text-[10px] font-bold uppercase">Préstamos Vigentes</span>
                            <div class="text-3xl font-black mt-1 text-indigo-400">0</div>
                        </div>
                        <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50">
                            <span class="text-slate-500 text-[10px] font-bold uppercase">Cobros para hoy</span>
                            <div class="text-3xl font-black mt-1 text-emerald-400">0</div>
                        </div>
                    </div>

                    <div class="mt-8 bg-slate-800/30 border-2 border-dashed border-slate-700/50 rounded-3xl p-20 text-center">
                        <p class="text-slate-500 font-medium text-sm">Cargando módulos operativos...</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
