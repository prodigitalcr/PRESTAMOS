<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Master Control | ProDigital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide:0.263.0/lucide.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-200 min-h-screen font-sans">

    <div id="toast-container" class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-2"></div>

    <!-- Login Screen -->
    <div id="auth-overlay" class="fixed inset-0 bg-[#0b1120] z-[100] flex flex-col items-center justify-center p-6">
        <div class="bg-[#1e293b] p-10 rounded-3xl border border-slate-700/50 w-full max-w-md shadow-2xl">
            <div class="bg-indigo-600/20 p-4 rounded-full w-20 h-20 mx-auto mb-6 flex items-center justify-center border border-indigo-500/30">
                <i data-lucide="shield-lock" class="w-10 h-10 text-indigo-400"></i>
            </div>
            <h1 class="text-2xl font-black mb-1 text-white text-center uppercase tracking-tight">SaaS Control</h1>
            <p class="text-slate-400 mb-8 text-sm text-center">Acceso exclusivo soporte: <br><span class="text-indigo-400 font-mono text-xs">norercarlop04@gmail.com</span></p>
            
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="email" required placeholder="Email de soporte" class="w-full p-4 rounded-xl bg-[#0f172a] border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none text-white">
                <input type="password" id="password" required placeholder="Contraseña" class="w-full p-4 rounded-xl bg-[#0f172a] border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none text-white">
                <button type="submit" id="btn-login" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl transition-all uppercase tracking-widest shadow-lg shadow-indigo-500/20">
                    Verificar Credenciales
                </button>
            </form>
            <p id="auth-error" class="text-red-400 bg-red-500/10 border border-red-500/20 p-3 rounded-lg mt-4 text-xs hidden font-bold text-center"></p>
        </div>
    </div>

    <!-- App Content -->
    <div id="main-content" class="hidden flex-col min-h-screen">
        <header class="bg-[#1e293b]/80 border-b border-slate-700 p-4 sticky top-0 backdrop-blur-md z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center px-2">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-lg"><i data-lucide="globe" class="text-white w-5 h-5"></i></div>
                    <h2 class="text-lg font-black text-white uppercase tracking-tighter">ProDigital Master</h2>
                </div>
                <div class="flex items-center gap-4">
                    <span id="user-display" class="hidden md:block text-[10px] font-mono text-slate-500 bg-slate-900 px-3 py-1 rounded-full"></span>
                    <button onclick="handleLogout()" class="text-slate-400 hover:text-red-400 text-sm font-bold flex items-center gap-2">
                        <i data-lucide="power" class="w-4 h-4"></i> Salir
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8 w-full flex-1">
            <!-- New Tenant Section -->
            <section class="bg-[#1e293b] border border-slate-700 p-6 rounded-3xl mb-8 shadow-xl">
                <h3 class="text-lg font-black mb-6 text-white uppercase flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-indigo-400"></i> Desplegar Nuevo Socio
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">ID Único (Carpeta)</label>
                        <input type="text" id="new-id" placeholder="ej: mipyme_cr" class="w-full bg-[#0b1120] border border-slate-700 p-3 rounded-xl outline-none focus:border-indigo-500 text-sm font-mono">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Nombre Comercial</label>
                        <input type="text" id="new-name" placeholder="Nombre de la empresa" class="w-full bg-[#0b1120] border border-slate-700 p-3 rounded-xl outline-none focus:border-indigo-500 text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Cuota Mensual (₡)</label>
                        <input type="number" id="new-monto" placeholder="0.00" class="w-full bg-[#0b1120] border border-slate-700 p-3 rounded-xl outline-none focus:border-indigo-500 text-sm">
                    </div>
                </div>
                <button id="btn-create" onclick="createTenant()" class="mt-6 bg-indigo-600 hover:bg-indigo-500 text-white font-black px-8 py-3 rounded-xl transition-all uppercase text-xs flex items-center gap-2 shadow-lg shadow-indigo-500/20">
                    Lanzar Plataforma <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </section>

            <!-- Table -->
            <div class="bg-[#1e293b] rounded-3xl border border-slate-700/50 overflow-hidden shadow-2xl">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50 text-slate-400 text-[10px] uppercase font-black tracking-widest border-b border-slate-700">
                        <tr>
                            <th class="p-5">Socio</th>
                            <th class="p-5">Monto</th>
                            <th class="p-5 text-center">Estado</th>
                            <th class="p-5">Acceso</th>
                            <th class="p-5 text-right">Opciones</th>
                        </tr>
                    </thead>
                    <tbody id="tenant-list" class="divide-y divide-slate-700/50"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="manageModal" class="fixed inset-0 bg-[#0b1120]/95 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-[#1e293b] border border-slate-600 w-full max-w-xl rounded-3xl p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-white mb-6 uppercase flex items-center gap-2">
                <i data-lucide="edit" class="text-indigo-400"></i> Gestionar Socio
            </h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Estado de Servicio</label>
                    <div class="grid grid-cols-3 gap-2 mt-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="m_status" value="Activo" class="hidden peer">
                            <div class="p-3 text-center rounded-xl border border-slate-700 peer-checked:bg-emerald-600/20 peer-checked:border-emerald-500 text-slate-500 peer-checked:text-emerald-400 font-bold text-[10px] uppercase">ACTIVO</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="m_status" value="Suspendido" class="hidden peer">
                            <div class="p-3 text-center rounded-xl border border-slate-700 peer-checked:bg-red-600/20 peer-checked:border-red-500 text-slate-500 peer-checked:text-red-400 font-bold text-[10px] uppercase">MORA</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="m_status" value="Mantenimiento" class="hidden peer">
                            <div class="p-3 text-center rounded-xl border border-slate-700 peer-checked:bg-amber-600/20 peer-checked:border-amber-500 text-slate-500 peer-checked:text-amber-400 font-bold text-[10px] uppercase">MANT.</div>
                        </label>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Cuota (₡)</label>
                        <input type="number" id="m_monto" class="w-full bg-[#0f172a] border border-slate-700 p-3 rounded-xl text-white outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Vencimiento</label>
                        <input type="date" id="m_corte" class="w-full bg-[#0f172a] border border-slate-700 p-3 rounded-xl text-white outline-none">
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal('manageModal')" class="flex-1 py-4 bg-slate-800 rounded-xl font-bold text-slate-400">Cancelar</button>
                    <button onclick="saveChanges()" class="flex-[2] py-4 bg-indigo-600 rounded-xl font-black text-white shadow-lg">Sincronizar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtPXuvsDuLDkpIJBlEEHFll6N-NofQ3bI",
            authDomain: "prestamos-c97ed.firebaseapp.com",
            projectId: "prestamos-c97ed",
            storageBucket: "prestamos-c97ed.firebasestorage.app",
            messagingSenderId: "511457800969",
            appId: "1:511457800969:web:18b8e97383fdb630b319d8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const APP_MASTER_ID = "MASTER_ADMIN_SaaS"; // Coincide con Regla === 0 ===
        const BASE_URL = "https://prodigitalcr.github.io/PRESTAMOS/"; 
        
        let currentTenants = [];
        let editingId = null;

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast-enter p-4 rounded-xl shadow-lg font-bold text-white text-xs ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`;
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
        };

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            
            // Validación local antes de intentar Firebase
            if(email !== 'norercarlop04@gmail.com') {
                document.getElementById('auth-error').innerText = "ERROR: Solo el correo de soporte autorizado tiene permisos de escritura según las reglas del servidor.";
                document.getElementById('auth-error').classList.remove('hidden');
                return;
            }

            try {
                btn.disabled = true; btn.innerText = "Autenticando...";
                await setPersistence(auth, browserLocalPersistence);
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                document.getElementById('auth-error').innerText = "Credenciales incorrectas o problema de red.";
                document.getElementById('auth-error').classList.remove('hidden');
            } finally {
                btn.disabled = false; btn.innerText = "Verificar Credenciales";
            }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                loadData();
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
            lucide.createIcons();
        });

        function loadData() {
            // Escuchar colección maestra
            onSnapshot(collection(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants'), (snap) => {
                const list = document.getElementById('tenant-list');
                list.innerHTML = "";
                currentTenants = [];

                snap.forEach(d => {
                    const t = d.data();
                    const id = d.id;
                    currentTenants.push({ id, ...t });

                    const fullUrl = t.estado === 'Activo' ? `${BASE_URL}?tenant=${id}` : BASE_URL;
                    const stColor = t.estado === 'Activo' ? 'text-emerald-400' : (t.estado === 'Mantenimiento' ? 'text-amber-400' : 'text-red-400');

                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-800/30 transition-all border-b border-slate-700/30";
                    row.innerHTML = `
                        <td class="p-5"><div class="font-black text-white text-xs uppercase">${t.empresa}</div><div class="text-[9px] text-slate-500 font-mono">${id}</div></td>
                        <td class="p-5 font-mono text-slate-400 text-xs font-bold">₡${Number(t.montoContrato || 0).toLocaleString()}</td>
                        <td class="p-5 text-center font-black ${stColor} text-[10px] uppercase tracking-tighter">${t.estado}</td>
                        <td class="p-5">
                            <button onclick="copyLink('${fullUrl}')" class="group flex items-center gap-2 text-slate-500 hover:text-indigo-400 transition-colors">
                                <span class="text-[10px] font-mono truncate max-w-[120px]">${fullUrl}</span>
                                <i data-lucide="copy" class="w-3 h-3"></i>
                            </button>
                        </td>
                        <td class="p-5 text-right flex justify-end gap-2">
                            <button onclick="openEdit('${id}')" class="p-2 bg-indigo-500/10 text-indigo-400 rounded-lg hover:bg-indigo-600 hover:text-white transition-all"><i data-lucide="settings" class="w-4 h-4"></i></button>
                            <button onclick="deleteTenant('${id}')" class="p-2 bg-red-500/10 text-red-400 rounded-lg hover:bg-red-600 hover:text-white transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    `;
                    list.appendChild(row);
                });
                lucide.createIcons();
            });
        }

        window.createTenant = async () => {
            const id = document.getElementById('new-id').value.trim().toLowerCase().replace(/\s/g, '_');
            const name = document.getElementById('new-name').value.trim();
            const monto = document.getElementById('new-monto').value;
            const btn = document.getElementById('btn-create');

            if(!id || !name) return showToast("El ID y el Nombre son requeridos", "error");

            try {
                btn.disabled = true; btn.innerText = "Escribiendo en Firestore...";
                
                // 1. Guardar en Registro Maestro (Ruta Regla === 0 ===)
                await setDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id), {
                    empresa: name,
                    montoContrato: Number(monto) || 0,
                    estado: 'Activo',
                    creado: new Date().toISOString()
                });

                // 2. Crear Configuración en el Socio (Ruta Regla === 5 ===)
                // Se usa 'admin_data' que es la ruta permitida por tus reglas para lectura pública
                await setDoc(doc(db, 'artifacts', id, 'public', 'data', 'usuarios', 'admin_data'), {
                    estadoTenant: 'Activo',
                    nombreEmpresa: name,
                    tenantId: id
                }, { merge: true });

                showToast("Socio creado exitosamente");
                document.getElementById('new-id').value = "";
                document.getElementById('new-name').value = "";
                document.getElementById('new-monto').value = "";
            } catch (e) {
                console.error(e);
                showToast("Error de Permisos: Asegúrate de usar el correo norercarlop04@gmail.com", "error");
            } finally {
                btn.disabled = false; btn.innerText = "Lanzar Plataforma";
                lucide.createIcons();
            }
        };

        window.openEdit = (id) => {
            editingId = id;
            const t = currentTenants.find(x => x.id === id);
            document.getElementById('m_monto').value = t.montoContrato;
            document.getElementById('m_corte').value = t.fechaCorte || '';
            const rads = document.getElementsByName('m_status');
            for(let r of rads) if(r.value === t.estado) r.checked = true;
            document.getElementById('manageModal').classList.remove('hidden');
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.saveChanges = async () => {
            const status = document.querySelector('input[name="m_status"]:checked').value;
            const monto = document.getElementById('m_monto').value;
            const corte = document.getElementById('m_corte').value;

            try {
                // Actualizar Maestro
                await setDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', editingId), {
                    estado: status,
                    montoContrato: Number(monto),
                    fechaCorte: corte
                }, { merge: true });

                // Sincronizar con el Socio (Admin Data)
                await setDoc(doc(db, 'artifacts', editingId, 'public', 'data', 'usuarios', 'admin_data'), {
                    estadoTenant: status
                }, { merge: true });

                showToast("Socio actualizado y sincronizado");
                closeModal('manageModal');
            } catch (e) {
                showToast("Error al guardar cambios", "error");
            }
        };

        window.deleteTenant = async (id) => {
            if(confirm(`¿Eliminar permanentemente a ${id} del panel maestro?`)) {
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id));
                    showToast("Registro eliminado");
                } catch(e) { showToast("Error al eliminar", "error"); }
            }
        };

        window.copyLink = (url) => {
            navigator.clipboard.writeText(url);
            showToast("Enlace copiado al portapapeles");
        };

    </script>
</body>
</html>
