<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Master Control | Gestión de Clientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide:0.263.0/lucide.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <!-- Auth Guard Overlay -->
    <div id="auth-overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md text-center">
            <h1 class="text-4xl font-black mb-2 text-indigo-500 italic uppercase">SaaS Master</h1>
            <p class="text-slate-400 mb-8 font-medium">Panel de Infraestructura</p>
            
            <div id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Correo de Administrador" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <input type="password" id="password" placeholder="Contraseña Maestra" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl shadow-lg shadow-indigo-900/40 transition-all uppercase tracking-widest">
                    Entrar al Sistema
                </button>
            </div>
            <p id="auth-error" class="text-red-400 mt-4 text-sm hidden font-bold"></p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <header class="bg-slate-800/50 border-b border-slate-700 p-6 sticky top-0 backdrop-blur-md z-40">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-lg">
                        <i data-lucide="shield-check" class="text-white"></i>
                    </div>
                    <h2 class="text-xl font-black tracking-tight italic uppercase">Infraestructura SaaS</h2>
                </div>
                <button onclick="handleLogout()" class="text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="log-out"></i>
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-6 md:p-12">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-1">Socios Activos</p>
                    <h3 id="stat-active" class="text-4xl font-black text-green-400">0</h3>
                </div>
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-1">Socios Suspendidos</p>
                    <h3 id="stat-suspended" class="text-4xl font-black text-red-400">0</h3>
                </div>
                <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-1">Recaudación Proyectada</p>
                    <h3 class="text-4xl font-black text-white">---</h3>
                </div>
            </div>

            <!-- Create New Tenant -->
            <section class="bg-indigo-900/20 border border-indigo-500/30 p-8 rounded-3xl mb-12">
                <h3 class="text-xl font-black mb-6 flex items-center gap-2">
                    <i data-lucide="plus-circle"></i> ALTA DE NUEVO SOCIO
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="new-id" placeholder="ID único (ej: socio_01)" class="bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <input type="text" id="new-name" placeholder="Nombre de Empresa" class="bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <input type="email" id="new-email" placeholder="Correo del Socio" class="bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <button onclick="createTenant()" class="bg-indigo-600 hover:bg-indigo-500 font-black rounded-xl transition-all shadow-lg shadow-indigo-900/40">
                        REGISTRAR SOCIO
                    </button>
                </div>
            </section>

            <!-- Table -->
            <div class="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-700/50 text-slate-300 text-xs font-bold uppercase">
                            <th class="p-6 uppercase">Socio / Empresa</th>
                            <th class="p-6 uppercase text-center">Estado de Pago</th>
                            <th class="p-6 uppercase">URL de Acceso</th>
                            <th class="p-6 uppercase text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tenant-list">
                        <!-- Dinámico -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtPXuvsDuLDkpIJBlEEHFll6N-NofQ3bI",
            authDomain: "prestamos-c97ed.firebaseapp.com",
            projectId: "prestamos-c97ed",
            storageBucket: "prestamos-c97ed.firebasestorage.app",
            messagingSenderId: "511457800969",
            appId: "1:511457800969:web:18b8e97383fdb630b319d8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const APP_MASTER_ID = "MASTER_ADMIN_SaaS";
        // Cambia esto por la URL donde alojes la plataforma del socio
        const BASE_URL = "https://tu-plataforma.com/plataforma_socio.html";

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('auth-error');

            if(email !== 'norercarlop04@gmail.com') {
                errorEl.innerText = "ACCESO DENEGADO: Solo el administrador maestro puede entrar.";
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                errorEl.innerText = "Credenciales incorrectas.";
                errorEl.classList.remove('hidden');
            }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === 'norercarlop04@gmail.com') {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                loadTenants();
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        function loadTenants() {
            onSnapshot(collection(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants'), (snapshot) => {
                const list = document.getElementById('tenant-list');
                list.innerHTML = "";
                let activeCount = 0;
                let suspendedCount = 0;

                snapshot.docs.forEach(docSnap => {
                    const t = docSnap.data();
                    const id = docSnap.id;
                    
                    if(t.estado === 'Activo') activeCount++; else suspendedCount++;

                    const row = document.createElement('tr');
                    row.className = "border-t border-slate-700/50 hover:bg-slate-700/20 transition-colors";
                    row.innerHTML = `
                        <td class="p-6">
                            <div class="font-black text-white uppercase italic">${t.empresa || id}</div>
                            <div class="text-xs text-slate-500 font-mono">${id}</div>
                        </td>
                        <td class="p-6 text-center">
                            <span class="px-4 py-1 rounded-full text-[10px] font-black uppercase ${t.estado === 'Activo' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">
                                ${t.estado || 'Activo'}
                            </span>
                        </td>
                        <td class="p-6">
                            <div class="flex items-center gap-2">
                                <input readonly value="${BASE_URL}?tenant=${id}" class="bg-slate-900 border border-slate-700 text-[10px] p-2 rounded w-48 text-slate-400">
                                <button onclick="copyURL('${id}')" class="p-2 hover:text-indigo-400"><i data-lucide="copy" class="w-4 h-4"></i></button>
                            </div>
                        </td>
                        <td class="p-6 text-right">
                            <div class="flex justify-end gap-3">
                                <button onclick="toggleStatus('${id}', '${t.estado}')" class="p-2 bg-slate-700 rounded-lg hover:bg-indigo-600 transition-all" title="Suspender/Activar">
                                    <i data-lucide="${t.estado === 'Activo' ? 'pause' : 'play'}" class="w-4 h-4"></i>
                                </button>
                                <button onclick="deleteTenant('${id}')" class="p-2 bg-slate-700 rounded-lg hover:bg-red-600 transition-all text-red-400 hover:text-white">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    list.appendChild(row);
                });

                document.getElementById('stat-active').innerText = activeCount;
                document.getElementById('stat-suspended').innerText = suspendedCount;
                lucide.createIcons();
            });
        }

        window.createTenant = async () => {
            const id = document.getElementById('new-id').value.trim().toLowerCase();
            const empresa = document.getElementById('new-name').value.trim();
            const email = document.getElementById('new-email').value.trim();

            if(!id || !empresa) return alert("Llena los campos básicos");

            try {
                // 1. Registrar en el Maestro
                await setDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id), {
                    empresa, email, estado: 'Activo', fechaAlta: new Date().toISOString()
                });

                // 2. Inicializar la DB del Socio (admin_data)
                await setDoc(doc(db, 'artifacts', id, 'public', 'data', 'usuarios', 'admin_data'), {
                    empresa,
                    estadoTenant: 'Activo',
                    rol: 'maestro'
                });

                alert("Socio creado exitosamente");
                document.getElementById('new-id').value = "";
                document.getElementById('new-name').value = "";
            } catch (err) {
                alert("Error: " + err.message);
            }
        };

        window.toggleStatus = async (id, currentStatus) => {
            const newStatus = currentStatus === 'Activo' ? 'Suspendido' : 'Activo';
            try {
                // Cambiamos estado en el maestro
                await updateDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id), { estado: newStatus });
                // Sincronizamos con la DB del socio para que la regla de seguridad lo detecte
                await updateDoc(doc(db, 'artifacts', id, 'public', 'data', 'usuarios', 'admin_data'), { estadoTenant: newStatus });
            } catch (err) { alert(err.message); }
        };

        window.deleteTenant = async (id) => {
            if(confirm(`¿Eliminar definitivamente a ${id}? Esto no borra sus datos pero perderás el control.`)) {
                await deleteDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id));
            }
        };

        window.copyURL = (id) => {
            const url = `${BASE_URL}?tenant=${id}`;
            navigator.clipboard.writeText(url);
            alert("URL copiada al portapapeles");
        };

        lucide.createIcons();
    </script>
</body>
</html>
