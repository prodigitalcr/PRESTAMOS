<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Master Control | Gestión Avanzada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide:0.263.0/lucide.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-200 min-h-screen font-sans">

    <div id="toast-container" class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-2"></div>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 bg-[#0b1120] z-[100] flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-[#1e293b] p-10 rounded-3xl border border-slate-700/50 w-full max-w-md text-center">
            <div class="bg-indigo-600/20 p-4 rounded-full w-20 h-20 mx-auto mb-6 flex items-center justify-center border border-indigo-500/30">
                <i data-lucide="shield-check" class="w-10 h-10 text-indigo-400"></i>
            </div>
            <h1 class="text-3xl font-black mb-2 text-white uppercase">SaaS Master</h1>
            <p class="text-slate-400 mb-8 text-sm">Panel de Administración</p>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="email" required placeholder="admin@empresa.com" class="w-full p-4 rounded-xl bg-[#0f172a] border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none text-white">
                <input type="password" id="password" required placeholder="••••••••" class="w-full p-4 rounded-xl bg-[#0f172a] border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none text-white">
                <button type="submit" id="btn-login" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl transition-all uppercase tracking-widest">Acceder</button>
            </form>
            <p id="auth-error" class="text-red-400 bg-red-500/10 border border-red-500/20 p-3 rounded-lg mt-4 text-xs hidden"></p>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-content" class="hidden flex-col min-h-screen">
        <header class="bg-[#1e293b]/80 border-b border-slate-700 p-4 sticky top-0 backdrop-blur-md z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center px-2">
                <div class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-2 rounded-lg">
                        <i data-lucide="server" class="text-white w-5 h-5"></i>
                    </div>
                    <h2 class="text-lg font-black text-white uppercase">ProDigital SaaS</h2>
                </div>
                <button onclick="handleLogout()" class="text-slate-400 hover:text-red-400 text-sm font-bold flex items-center gap-2">
                    <i data-lucide="power" class="w-4 h-4"></i> Salir
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8 w-full flex-1">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">Socios Registrados</p>
                    <h3 id="stat-total" class="text-3xl font-black text-white">0</h3>
                </div>
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50">
                    <p class="text-emerald-500 text-[10px] font-bold uppercase">Sitios Activos</p>
                    <h3 id="stat-active" class="text-3xl font-black text-emerald-400">0</h3>
                </div>
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50">
                    <p class="text-indigo-400 text-[10px] font-bold uppercase">Ingresos Mensuales</p>
                    <h3 id="stat-ingresos" class="text-3xl font-black text-indigo-400">₡0</h3>
                </div>
            </div>

            <!-- New Tenant Form -->
            <section class="bg-[#1e293b] border border-slate-700 p-6 rounded-3xl mb-8">
                <h3 class="text-lg font-black mb-6 text-white uppercase flex items-center gap-2">
                    <i data-lucide="plus-circle" class="text-indigo-400"></i> Registrar Nuevo Socio
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <input type="text" id="new-id" placeholder="ID de la empresa (ej: mipyme)" class="bg-[#0b1120] border border-slate-700 p-3 rounded-xl outline-none focus:border-indigo-500 text-sm">
                    <input type="text" id="new-name" placeholder="Nombre Comercial" class="bg-[#0b1120] border border-slate-700 p-3 rounded-xl outline-none focus:border-indigo-500 text-sm">
                    <input type="number" id="new-monto" placeholder="Monto (₡)" class="bg-[#0b1120] border border-slate-700 p-3 rounded-xl outline-none focus:border-indigo-500 text-sm">
                </div>
                <button id="btn-create" onclick="createTenant()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-black px-8 py-3 rounded-xl transition-all uppercase text-xs flex items-center gap-2">
                    Crear Plataforma <i data-lucide="rocket" class="w-4 h-4"></i>
                </button>
            </section>

            <!-- Table -->
            <div class="bg-[#1e293b] rounded-3xl border border-slate-700/50 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50 text-slate-400 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="p-5">Empresa</th>
                            <th class="p-5">Cuota</th>
                            <th class="p-5 text-center">Estado</th>
                            <th class="p-5">Enlace</th>
                            <th class="p-5 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tenant-list" class="divide-y divide-slate-700/50"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="manageModal" class="fixed inset-0 bg-[#0b1120]/95 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-[#1e293b] border border-slate-600 w-full max-w-2xl rounded-3xl p-8">
            <h2 class="text-2xl font-black text-white mb-6 uppercase flex items-center gap-2">
                <i data-lucide="settings" class="text-indigo-400"></i> Gestionar: <span id="manage-name" class="text-indigo-400"></span>
            </h2>
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Estado del Servicio</label>
                    <div class="grid grid-cols-3 gap-2 mt-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="m_status" value="Activo" class="hidden peer">
                            <div class="p-3 text-center rounded-xl border border-slate-700 peer-checked:bg-emerald-600/20 peer-checked:border-emerald-500 text-slate-500 peer-checked:text-emerald-400 font-bold text-xs uppercase">Activo</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="m_status" value="Suspendido" class="hidden peer">
                            <div class="p-3 text-center rounded-xl border border-slate-700 peer-checked:bg-red-600/20 peer-checked:border-red-500 text-slate-500 peer-checked:text-red-400 font-bold text-xs uppercase">Mora</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="m_status" value="Mantenimiento" class="hidden peer">
                            <div class="p-3 text-center rounded-xl border border-slate-700 peer-checked:bg-amber-600/20 peer-checked:border-amber-500 text-slate-500 peer-checked:text-amber-400 font-bold text-xs uppercase">Mant.</div>
                        </label>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="m_monto" placeholder="Cuota Mensual" class="bg-[#0f172a] border border-slate-700 p-3 rounded-xl text-white outline-none focus:border-indigo-500">
                    <input type="date" id="m_fecha" class="bg-[#0f172a] border border-slate-700 p-3 rounded-xl text-white outline-none focus:border-indigo-500">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal('manageModal')" class="flex-1 py-4 bg-slate-800 rounded-xl font-bold text-slate-400">Cancelar</button>
                    <button onclick="saveTenantConfig()" class="flex-[2] py-4 bg-indigo-600 rounded-xl font-black text-white shadow-lg">GUARDAR CAMBIOS</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtPXuvsDuLDkpIJBlEEHFll6N-NofQ3bI",
            authDomain: "prestamos-c97ed.firebaseapp.com",
            projectId: "prestamos-c97ed",
            storageBucket: "prestamos-c97ed.firebasestorage.app",
            messagingSenderId: "511457800969",
            appId: "1:511457800969:web:18b8e97383fdb630b319d8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const APP_MASTER_ID = "MASTER_ADMIN_SaaS";
        const BASE_URL = "https://prodigitalcr.github.io/PRESTAMOS/"; 
        
        let currentTenants = [];
        let editingId = null;

        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast-enter p-4 rounded-xl shadow-lg font-bold text-white text-sm ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`;
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                document.getElementById('auth-error').innerText = "Credenciales inválidas.";
                document.getElementById('auth-error').classList.remove('hidden');
            }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initData();
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
            }
            lucide.createIcons();
        });

        function initData() {
            onSnapshot(collection(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants'), (snap) => {
                const list = document.getElementById('tenant-list');
                list.innerHTML = "";
                let total = 0, activos = 0, ingresos = 0;
                currentTenants = [];

                snap.forEach(d => {
                    const t = d.data();
                    const id = d.id;
                    currentTenants.push({ id, ...t });
                    
                    total++;
                    if(t.estado === 'Activo') activos++;
                    ingresos += Number(t.montoContrato || 0);

                    const finalUrl = t.estado === 'Activo' ? `${BASE_URL}?tenant=${id}` : BASE_URL;
                    const statusClass = t.estado === 'Activo' ? 'text-emerald-400' : 'text-red-400';

                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-800/30 transition-all";
                    row.innerHTML = `
                        <td class="p-5 font-bold text-white uppercase text-xs">${t.empresa}</td>
                        <td class="p-5 font-mono text-slate-400">₡${Number(t.montoContrato).toLocaleString()}</td>
                        <td class="p-5 text-center font-black ${statusClass} uppercase text-[10px]">${t.estado}</td>
                        <td class="p-5">
                            <button onclick="copyLink('${finalUrl}')" class="text-[10px] text-slate-500 hover:text-indigo-400 truncate max-w-[150px] font-mono">
                                ${finalUrl}
                            </button>
                        </td>
                        <td class="p-5 text-right flex justify-end gap-2">
                            <button onclick="openEdit('${id}')" class="p-2 bg-indigo-600/10 text-indigo-400 rounded-lg hover:bg-indigo-600 hover:text-white transition-all">
                                <i data-lucide="edit-3" class="w-4 h-4"></i>
                            </button>
                            <button onclick="deleteTenant('${id}')" class="p-2 bg-red-600/10 text-red-400 rounded-lg hover:bg-red-600 hover:text-white transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    `;
                    list.appendChild(row);
                });
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-active').innerText = activos;
                document.getElementById('stat-ingresos').innerText = `₡${ingresos.toLocaleString()}`;
                lucide.createIcons();
            });
        }

        window.createTenant = async () => {
            const id = document.getElementById('new-id').value.trim().toLowerCase();
            const name = document.getElementById('new-name').value.trim();
            const monto = document.getElementById('new-monto').value;
            const btn = document.getElementById('btn-create');

            if(!id || !name) return showToast("Faltan campos obligatorios", "error");
            
            btn.disabled = true;
            btn.innerText = "Desplegando...";

            try {
                // 1. Guardar en Panel Maestro
                await setDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id), {
                    empresa: name,
                    montoContrato: Number(monto) || 0,
                    estado: 'Activo',
                    fechaAlta: new Date().toISOString()
                });

                // 2. Crear documento de configuración inicial en la base del socio
                await setDoc(doc(db, 'artifacts', id, 'public', 'data', 'configuracion'), {
                    estadoTenant: 'Activo',
                    nombreEmpresa: name,
                    idTenant: id
                });

                showToast("Socio desplegado con éxito");
                document.getElementById('new-id').value = "";
                document.getElementById('new-name').value = "";
                document.getElementById('new-monto').value = "";
            } catch (e) {
                showToast("Error de permisos en Firebase", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Crear Plataforma <i data-lucide="rocket" class="w-4 h-4"></i>';
                lucide.createIcons();
            }
        };

        window.deleteTenant = async (id) => {
            if(confirm("¿Seguro que deseas eliminar este socio permanentemente?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id));
                    showToast("Socio eliminado");
                } catch(e) { showToast("No se pudo eliminar", "error"); }
            }
        };

        window.openEdit = (id) => {
            editingId = id;
            const t = currentTenants.find(x => x.id === id);
            document.getElementById('manage-name').innerText = t.empresa;
            document.getElementById('m_monto').value = t.montoContrato;
            document.getElementById('m_fecha').value = t.fechaCorte || '';
            const rads = document.getElementsByName('m_status');
            for(let r of rads) if(r.value === t.estado) r.checked = true;
            document.getElementById('manageModal').classList.remove('hidden');
            lucide.createIcons();
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.saveTenantConfig = async () => {
            const status = document.querySelector('input[name="m_status"]:checked').value;
            const monto = document.getElementById('m_monto').value;
            const fecha = document.getElementById('m_fecha').value;

            try {
                // Actualizar Maestro
                await setDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', editingId), {
                    estado: status,
                    montoContrato: Number(monto),
                    fechaCorte: fecha
                }, { merge: true });

                // Sincronizar con el Socio
                await setDoc(doc(db, 'artifacts', editingId, 'public', 'data', 'configuracion'), {
                    estadoTenant: status
                }, { merge: true });

                showToast("Configuración actualizada");
                closeModal('manageModal');
            } catch(e) { showToast("Error al guardar", "error"); }
        };

        window.copyLink = (url) => {
            navigator.clipboard.writeText(url);
            showToast("Enlace copiado");
        };

    </script>
</body>
</html>
