<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Master Control | Gestión de Socios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide:0.263.0/lucide.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-200 min-h-screen font-sans selection:bg-indigo-500 selection:text-white">

    <div id="toast-container" class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Auth Guard -->
    <div id="auth-overlay" class="fixed inset-0 bg-[#0b1120] z-[100] flex flex-col items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-[#1e293b] p-10 rounded-3xl shadow-2xl border border-slate-700/50 w-full max-w-md text-center">
            <div class="bg-indigo-600/20 p-4 rounded-full w-20 h-20 mx-auto mb-6 flex items-center justify-center border border-indigo-500/30">
                <i data-lucide="shield-check" class="w-10 h-10 text-indigo-400"></i>
            </div>
            <h1 class="text-3xl font-black mb-2 text-white uppercase tracking-tight">SaaS Master</h1>
            <p class="text-slate-400 mb-8 font-medium text-sm">Control de Acceso</p>
            
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <input type="email" id="email" required placeholder="admin@prodigital.com" class="w-full p-4 rounded-xl bg-[#0f172a] border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-white">
                <input type="password" id="password" required placeholder="••••••••" class="w-full p-4 rounded-xl bg-[#0f172a] border border-slate-700 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-white">
                <button type="submit" id="btn-login" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl shadow-lg transition-all uppercase tracking-widest">
                    Entrar al Sistema
                </button>
            </form>
            <p id="auth-error" class="text-red-400 bg-red-500/10 border border-red-500/20 p-3 rounded-lg mt-4 text-xs hidden font-bold"></p>
        </div>
    </div>

    <!-- Layout Principal -->
    <div id="main-content" class="hidden flex-col min-h-screen">
        <header class="bg-[#1e293b]/80 border-b border-slate-700 p-4 sticky top-0 backdrop-blur-md z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-600 p-2 rounded-lg"><i data-lucide="layout" class="text-white w-5 h-5"></i></div>
                    <h2 class="text-lg font-black text-white uppercase tracking-tighter">ProDigital SaaS Control</h2>
                </div>
                <button onclick="handleLogout()" class="text-slate-400 hover:text-red-400 font-bold flex items-center gap-2 text-sm transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Cerrar Sesión
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 md:p-8 w-full flex-1">
            <!-- Estadísticas -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50">
                    <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Clientes Totales</p>
                    <h3 id="stat-total" class="text-4xl font-black text-white">0</h3>
                </div>
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50">
                    <p class="text-emerald-500 text-[10px] font-black uppercase tracking-widest mb-1">Sitios Online</p>
                    <h3 id="stat-active" class="text-4xl font-black text-emerald-400">0</h3>
                </div>
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50">
                    <p class="text-indigo-400 text-[10px] font-black uppercase tracking-widest mb-1">Ingresos Estimados</p>
                    <h3 id="stat-money" class="text-4xl font-black text-indigo-400">₡0</h3>
                </div>
            </div>

            <!-- Registro -->
            <section class="bg-[#1e293b] border border-slate-700 p-6 md:p-8 rounded-3xl mb-8 shadow-xl">
                <h3 class="text-xl font-black mb-6 flex items-center gap-2 text-white">
                    <i data-lucide="user-plus" class="text-indigo-400"></i> ALTA DE NUEVO SOCIO
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="new-id" placeholder="ID (ej: carwash_sj)" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-xl outline-none focus:border-indigo-500 text-sm font-mono text-white">
                    <input type="text" id="new-name" placeholder="Nombre de la Empresa" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-xl outline-none focus:border-indigo-500 text-sm text-white">
                    <input type="number" id="new-monto" placeholder="Monto Mensual (₡)" class="w-full bg-[#0b1120] border border-slate-700 p-4 rounded-xl outline-none focus:border-indigo-500 text-sm text-white">
                </div>
                <button id="btn-deploy" onclick="createTenant()" class="mt-4 w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 text-white font-black px-10 py-4 rounded-xl transition-all uppercase text-xs flex items-center justify-center gap-2">
                    Desplegar Plataforma <i data-lucide="rocket" class="w-4 h-4"></i>
                </button>
            </section>

            <!-- Tabla de Control -->
            <div class="bg-[#1e293b] rounded-3xl border border-slate-700/50 shadow-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-900/50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b border-slate-700">
                                <th class="p-5">Nombre del Socio</th>
                                <th class="p-5">Cuota</th>
                                <th class="p-5 text-center">Estado Técnico</th>
                                <th class="p-5">Enlace de Acceso</th>
                                <th class="p-5 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tenant-list" class="divide-y divide-slate-700/50">
                            <!-- JS Injection -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Configuración -->
    <div id="manageModal" class="fixed inset-0 bg-[#0b1120]/95 z-[200] hidden flex flex-col items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-[#1e293b] border border-slate-600 w-full max-w-2xl rounded-3xl p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-white flex items-center gap-2">
                    <i data-lucide="settings" class="text-indigo-400"></i> GESTIÓN: <span id="m_name" class="text-indigo-400">...</span>
                </h2>
                <button onclick="closeModal('manageModal')" class="text-slate-500 hover:text-white"><i data-lucide="x"></i></button>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Cambiar Estado del Sitio</label>
                    <div class="grid grid-cols-3 gap-3 mt-2">
                        <label class="cursor-pointer">
                            <input type="radio" name="m_status" value="Activo" class="peer hidden">
                            <div class="p-4 rounded-xl border border-slate-700 text-center font-bold text-xs peer-checked:bg-emerald-600/20 peer-checked:border-emerald-500 peer-checked:text-emerald-400 transition-all uppercase">Activar</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="m_status" value="Suspendido" class="peer hidden">
                            <div class="p-4 rounded-xl border border-slate-700 text-center font-bold text-xs peer-checked:bg-red-600/20 peer-checked:border-red-500 peer-checked:text-red-400 transition-all uppercase">Suspender</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="m_status" value="Mantenimiento" class="peer hidden">
                            <div class="p-4 rounded-xl border border-slate-700 text-center font-bold text-xs peer-checked:bg-amber-600/20 peer-checked:border-amber-500 peer-checked:text-amber-400 transition-all uppercase">Mantenimiento</div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Ajustar Cuota</label>
                        <input type="number" id="m_monto" class="w-full bg-[#0f172a] border border-slate-700 p-4 mt-1 rounded-xl text-white">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Próximo Pago</label>
                        <input type="date" id="m_corte" class="w-full bg-[#0f172a] border border-slate-700 p-4 mt-1 rounded-xl text-white">
                    </div>
                </div>

                <div class="pt-4 flex gap-3">
                    <button onclick="closeModal('manageModal')" class="flex-1 py-4 bg-slate-800 rounded-xl font-bold text-slate-400">Cancelar</button>
                    <button onclick="updateTenant()" id="btn-save" class="flex-[2] py-4 bg-indigo-600 rounded-xl font-black text-white shadow-lg flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> ACTUALIZAR SOCIO
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN BASADA EN TU ARCHIVO
        const firebaseConfig = {
            apiKey: "AIzaSyCtPXuvsDuLDkpIJBlEEHFll6N-NofQ3bI",
            authDomain: "prestamos-c97ed.firebaseapp.com",
            projectId: "prestamos-c97ed",
            storageBucket: "prestamos-c97ed.firebasestorage.app",
            messagingSenderId: "511457800969",
            appId: "1:511457800969:web:18b8e97383fdb630b319d8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const APP_MASTER_ID = "MASTER_ADMIN_SaaS";
        const BASE_URL = "https://prodigitalcr.github.io/PRESTAMOS/"; 
        
        let currentData = [];
        let activeEditId = null;

        // Utilería
        window.showToast = (msg, type = 'success') => {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast-enter p-4 rounded-xl text-white font-bold text-xs ${type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`;
            t.innerText = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        // Autenticación
        window.handleLogin = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            btn.disabled = true;
            btn.innerText = "Validando...";

            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                const errEl = document.getElementById('auth-error');
                errEl.innerText = "Error: Acceso denegado. Revisa tus credenciales.";
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Entrar al Sistema";
            }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                syncData();
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
            }
            lucide.createIcons();
        });

        // Sincronización Realtime
        function syncData() {
            onSnapshot(collection(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants'), (snap) => {
                const list = document.getElementById('tenant-list');
                list.innerHTML = "";
                let total = 0, activos = 0, plata = 0;
                currentData = [];

                snap.forEach(docSnap => {
                    const t = docSnap.data();
                    const id = docSnap.id;
                    currentData.push({ id, ...t });

                    total++;
                    if(t.estado === 'Activo') activos++;
                    plata += Number(t.montoContrato || 0);

                    // REGLA: Si es activo añade ?tenant=, si no, se queda base (bloqueado)
                    const fullLink = t.estado === 'Activo' ? `${BASE_URL}?tenant=${id}` : BASE_URL;
                    const stColor = t.estado === 'Activo' ? 'text-emerald-400' : (t.estado === 'Mantenimiento' ? 'text-amber-400' : 'text-red-400');

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-800/40 transition-colors border-b border-slate-700/50";
                    tr.innerHTML = `
                        <td class="p-5 font-bold text-white uppercase text-xs">${t.empresa}</td>
                        <td class="p-5 font-mono text-slate-400 text-sm">₡${Number(t.montoContrato).toLocaleString()}</td>
                        <td class="p-5 text-center font-black ${stColor} text-[10px] uppercase">${t.estado}</td>
                        <td class="p-5">
                            <div class="flex items-center gap-2 group">
                                <span class="text-[10px] text-slate-500 font-mono truncate max-w-[150px]">${fullLink}</span>
                                <button onclick="navigator.clipboard.writeText('${fullLink}'); showToast('Copiado');" class="p-1 hover:text-indigo-400"><i data-lucide="copy" class="w-3 h-3"></i></button>
                            </div>
                        </td>
                        <td class="p-5 text-right flex justify-end gap-2">
                            <button onclick="openConfig('${id}')" class="p-2 bg-indigo-600/10 text-indigo-400 rounded-lg hover:bg-indigo-600 hover:text-white transition-all"><i data-lucide="settings" class="w-4 h-4"></i></button>
                            <button onclick="confirmDelete('${id}')" class="p-2 bg-red-600/10 text-red-400 rounded-lg hover:bg-red-600 hover:text-white transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </td>
                    `;
                    list.appendChild(tr);
                });

                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-active').innerText = activos;
                document.getElementById('stat-money').innerText = `₡${plata.toLocaleString()}`;
                lucide.createIcons();
            });
        }

        // Acciones CRUD
        window.createTenant = async () => {
            const id = document.getElementById('new-id').value.trim().toLowerCase();
            const empresa = document.getElementById('new-name').value.trim();
            const monto = document.getElementById('new-monto').value;
            const btn = document.getElementById('btn-deploy');

            if(!id || !empresa) return showToast("Faltan datos básicos", "error");
            btn.disabled = true;

            try {
                // 1. Guardar en Maestro
                await setDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id), {
                    empresa,
                    montoContrato: Number(monto) || 0,
                    estado: 'Activo',
                    creado: new Date().toISOString()
                });

                // 2. Sincronizar en el Socio para que su app arranque activa
                await setDoc(doc(db, 'artifacts', id, 'public', 'data', 'usuarios', 'admin_data'), {
                    estadoTenant: 'Activo',
                    nombreEmpresa: empresa
                }, { merge: true });

                showToast("Socio desplegado");
                document.getElementById('new-id').value = "";
                document.getElementById('new-name').value = "";
                document.getElementById('new-monto').value = "";
            } catch (e) {
                showToast("Error de permisos Firestore", "error");
            } finally {
                btn.disabled = false;
            }
        };

        window.openConfig = (id) => {
            activeEditId = id;
            const t = currentData.find(x => x.id === id);
            document.getElementById('m_name').innerText = t.empresa;
            document.getElementById('m_monto').value = t.montoContrato;
            document.getElementById('m_corte').value = t.fechaCorte || '';
            const rads = document.getElementsByName('m_status');
            for(let r of rads) if(r.value === t.estado) r.checked = true;
            openModal('manageModal');
            lucide.createIcons();
        };

        window.updateTenant = async () => {
            const id = activeEditId;
            const estado = document.querySelector('input[name="m_status"]:checked').value;
            const monto = document.getElementById('m_monto').value;
            const fecha = document.getElementById('m_corte').value;
            const btn = document.getElementById('btn-save');
            btn.disabled = true;

            try {
                // Actualizar Panel Maestro
                await setDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id), {
                    estado,
                    montoContrato: Number(monto),
                    fechaCorte: fecha
                }, { merge: true });

                // Sincronizar con el Socio (Importante para que su app se bloquee/muestre aviso)
                await setDoc(doc(db, 'artifacts', id, 'public', 'data', 'usuarios', 'admin_data'), {
                    estadoTenant: estado
                }, { merge: true });

                showToast("Socio actualizado con éxito");
                closeModal('manageModal');
            } catch (e) {
                showToast("Fallo al actualizar", "error");
            } finally {
                btn.disabled = false;
            }
        };

        window.confirmDelete = async (id) => {
            if(confirm(`¿Estás seguro de eliminar a ${id}? Se borrará del Panel Maestro.`)) {
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id));
                    showToast("Socio eliminado");
                } catch(e) {
                    showToast("Error de eliminación", "error");
                }
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
