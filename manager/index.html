<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión | Acceso Socio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white">

    <div id="app-root">
        <div class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-500 mx-auto mb-4"></div>
                <p class="text-slate-400 font-mono text-xs uppercase tracking-widest">Verificando estado del servicio...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtPXuvsDuLDkpIJBlEEHFll6N-NofQ3bI",
            authDomain: "prestamos-c97ed.firebaseapp.com",
            projectId: "prestamos-c97ed",
            storageBucket: "prestamos-c97ed.firebasestorage.app",
            messagingSenderId: "511457800969",
            appId: "1:511457800969:web:18b8e97383fdb630b319d8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Capturar el Tenant ID de la URL (?tenant=ID)
        const urlParams = new URLSearchParams(window.location.search);
        const tenantId = urlParams.get('tenant');

        if (!tenantId) {
            document.getElementById('app-root').innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 text-center">
                    <div class="bg-red-500/10 border border-red-500/20 p-8 rounded-3xl max-w-sm">
                        <h2 class="text-red-500 font-black mb-2 uppercase text-sm">Error de Configuración</h2>
                        <p class="text-slate-400 text-xs">No se detectó un identificador de socio en la URL.</p>
                    </div>
                </div>
            `;
        } else {
            // Referencia al documento de control público del socio
            const adminDocRef = doc(db, 'artifacts', tenantId, 'public', 'data', 'usuarios', 'admin_data');
            
            // Suscripción en tiempo real al estado del inquilino
            onSnapshot(adminDocRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // 1. SI EL ESTADO ES MANTENIMIENTO
                    if (data.estadoTenant === 'Mantenimiento') {
                        const htmlMant = data.htmlMantenimiento;
                        if (htmlMant && htmlMant.trim() !== "") {
                            document.open();
                            document.write(htmlMant);
                            document.close();
                            window.stop();
                        } else {
                            renderDefaultMessage("Mantenimiento Programado", "Estamos optimizando nuestros sistemas.");
                        }
                    } 
                    // 2. SI EL ESTADO ES MORA O SUSPENDIDO
                    else if (data.estadoTenant === 'Mora' || data.estadoTenant === 'Suspendido') {
                        const htmlMora = data.htmlMora;
                        if (htmlMora && htmlMora.trim() !== "") {
                            document.open();
                            document.write(htmlMora);
                            document.close();
                            window.stop();
                        } else {
                            renderDefaultMessage("Pago Pendiente", "Por favor contacte a soporte para regularizar su cuenta.");
                        }
                    } 
                    // 3. SI ESTÁ ACTIVO
                    else {
                        renderApp(data);
                    }
                }
            }, (error) => {
                console.error("Error en tiempo real:", error);
            });
        }

        // Mensaje de respaldo por si no hay HTML en Firebase
        function renderDefaultMessage(title, subtitle) {
            document.body.innerHTML = `
                <div style="background:#0b1120;color:white;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-family:sans-serif;padding:20px;">
                    <div style="background:rgba(245,158,11,0.1);padding:40px;border-radius:40px;border:1px solid rgba(245,158,11,0.3);max-width:450px;">
                        <h1 style="font-size:24px;font-weight:900;text-transform:uppercase;margin-bottom:10px;color:#f59e0b;">\${title}</h1>
                        <p style="color:#94a3b8;font-size:14px;">\${subtitle}</p>
                    </div>
                </div>
            `;
        }

        // Función para renderizar la aplicación normal
        function renderApp(adminData) {
            const root = document.getElementById('app-root');
            root.innerHTML = `
                <div class="p-4 md:p-8 max-w-6xl mx-auto">
                    <header class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50 shadow-xl">
                        <div>
                            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">\${adminData.nombreEmpresa || 'Gestión de Préstamos'}</h1>
                            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-1">Panel Operativo de Socio</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-emerald-400 font-black text-xs uppercase tracking-widest flex items-center gap-2">
                                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Servicio Activo
                            </span>
                        </div>
                    </header>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50 text-center">
                            <span class="text-slate-500 text-[10px] font-bold uppercase">Estado Operativo</span>
                            <div class="text-xl font-black mt-1 text-white uppercase tracking-widest">En Línea</div>
                        </div>
                        <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50 text-center">
                            <span class="text-slate-500 text-[10px] font-bold uppercase">ID Inquilino</span>
                            <div class="text-xl font-black mt-1 text-indigo-400 font-mono tracking-tighter">\${tenantId}</div>
                        </div>
                        <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-700/50 text-center">
                            <span class="text-slate-500 text-[10px] font-bold uppercase">Soporte</span>
                            <div class="text-xl font-black mt-1 text-emerald-400">ProDigital</div>
                        </div>
                    </div>

                    <div class="mt-8 bg-slate-800/30 border-2 border-dashed border-slate-700/50 rounded-3xl p-20 text-center">
                        <p class="text-slate-500 font-medium text-sm italic">Módulo de gestión de préstamos listo para operar...</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
