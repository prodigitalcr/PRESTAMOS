<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Master Control | Gestión de Clientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide:0.263.0/lucide.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <!-- Auth Guard Overlay -->
    <div id="auth-overlay" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-full max-w-md text-center">
            <h1 class="text-3xl font-black mb-2 text-blue-400">SaaS Manager</h1>
            <p class="text-slate-400 mb-8 italic">Panel de Control Maestro</p>
            
            <div id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Correo de Administrador" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="password" placeholder="Contraseña Maestra" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                    Acceder al Sistema
                </button>
            </div>
            <p id="auth-error" class="text-red-400 mt-4 hidden text-sm"></p>
        </div>
    </div>

    <!-- Main Content (Hidden until Auth) -->
    <main id="main-content" class="hidden">
        <!-- Header -->
        <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-40">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-lg">
                        <i data-lucide="shield-check" class="w-6 h-6"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight">SaaS <span class="text-blue-400">Control Hub</span></h1>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-white flex items-center gap-2 text-sm">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Salir
                </button>
            </div>
        </header>

        <div class="max-w-6xl mx-auto p-4 lg:p-8">
            <!-- Stats Row -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <p class="text-slate-400 text-sm font-semibold uppercase">Total Clientes</p>
                    <h2 class="text-4xl font-black mt-2" id="stat-total">0</h2>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <p class="text-slate-400 text-sm font-semibold uppercase">Activos</p>
                    <h2 class="text-green-400 text-4xl font-black mt-2" id="stat-active">0</h2>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <p class="text-slate-400 text-sm font-semibold uppercase">En Mora / Suspendidos</p>
                    <h2 class="text-red-400 text-4xl font-black mt-2" id="stat-suspended">0</h2>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
                <h3 class="text-2xl font-bold">Cartera de Clientes SaaS</h3>
                <button onclick="openModal('newTenantModal')" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 transition-all">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> Registrar Nuevo Cliente
                </button>
            </div>

            <!-- Tenants Table -->
            <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-700/50 border-b border-slate-600">
                            <tr>
                                <th class="p-4 font-bold text-slate-300">Cliente / Empresa</th>
                                <th class="p-4 font-bold text-slate-300">Tenant ID (URL)</th>
                                <th class="p-4 font-bold text-slate-300">Plan</th>
                                <th class="p-4 font-bold text-slate-300">Estado</th>
                                <th class="p-4 font-bold text-slate-300 text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tenants-list" class="divide-y divide-slate-700">
                            <!-- JS populated -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal: Nuevo Tenant -->
    <div id="newTenantModal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-lg rounded-2xl p-6 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <i data-lucide="building" class="text-blue-400"></i> Registrar Cliente
            </h2>
            <form id="tenantForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1 font-medium">Nombre de la Empresa</label>
                    <input type="text" id="t_nombre" placeholder="Ej: Inversiones Juan" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1 font-medium">Tenant ID (Solo letras y números)</label>
                    <input type="text" id="t_id" placeholder="ej: inversiones_juan" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1 font-medium">Plan de Pago</label>
                        <select id="t_plan" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none">
                            <option value="Basico">Básico ($20/mes)</option>
                            <option value="Pro">Pro ($50/mes)</option>
                            <option value="Empresarial">Premium ($100/mes)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1 font-medium">Vencimiento Mensual</label>
                        <input type="date" id="t_fecha" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none">
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal('newTenantModal')" class="flex-1 py-3 font-bold text-slate-400 hover:bg-slate-700 rounded-xl transition-all">Cancelar</button>
                    <button type="submit" class="flex-1 py-3 font-bold bg-blue-600 hover:bg-blue-500 rounded-xl transition-all shadow-lg">Crear Acceso</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACION (Usa tus credenciales reales aquí)
        const firebaseConfig = {
            apiKey: "AIzaSyCtPXuvsDuLDkpIJBlEEHFll6N-NofQ3bI",
            authDomain: "prestamos-c97ed.firebaseapp.com",
            projectId: "prestamos-c97ed",
            storageBucket: "prestamos-c97ed.firebasestorage.app",
            messagingSenderId: "511457800969",
            appId: "1:511457800969:web:18b8e97383fdb630b319d8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_MASTER_ID = "MASTER_ADMIN_SaaS"; // Colección central

        // URL BASE de tu aplicación para generar enlaces
        const BASE_URL = "https://prodigitalcr.github.io/PRESTAMOS/"; 

        // LOGIN LÓGICA
        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('auth-error');

            // Seguridad básica: Solo permitimos tu correo
            if (email !== 'norercarlop04@gmail.com') {
                errorEl.innerText = "Acceso denegado: Solo el dueño de la plataforma puede entrar.";
                errorEl.classList.remove('hidden');
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                errorEl.innerText = "Credenciales incorrectas.";
                errorEl.classList.remove('hidden');
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === 'norercarlop04@gmail.com') {
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                initSaaSManager();
                lucide.createIcons();
            } else {
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        // MODALES
        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        // CRUD TENANTS
        function initSaaSManager() {
            const q = collection(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants');
            
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('tenants-list');
                list.innerHTML = "";
                let countActive = 0;
                let countSuspended = 0;
                
                snapshot.forEach(docSnap => {
                    const t = docSnap.data();
                    const id = docSnap.id;
                    
                    if(t.estado === 'Activo') countActive++; else countSuspended++;

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-700/30 transition-colors group";
                    tr.innerHTML = `
                        <td class="p-4 font-semibold">${t.nombre}</td>
                        <td class="p-4">
                            <span class="text-blue-400 font-mono text-sm underline cursor-pointer" onclick="copyURL('${id}')">?tenant=${id}</span>
                        </td>
                        <td class="p-4 text-slate-400 text-sm">${t.plan}</td>
                        <td class="p-4 text-sm">
                            <span class="px-3 py-1 rounded-full font-bold ${t.estado === 'Activo' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}">
                                ${t.estado}
                            </span>
                        </td>
                        <td class="p-4 text-right space-x-2">
                            <button onclick="toggleTenantStatus('${id}', '${t.estado}')" class="p-2 hover:bg-slate-600 rounded-lg text-slate-300" title="Activar/Suspender">
                                <i data-lucide="${t.estado === 'Activo' ? 'pause-circle' : 'play-circle'}" class="w-5 h-5"></i>
                            </button>
                            <button onclick="deleteTenant('${id}')" class="p-2 hover:bg-red-600/20 rounded-lg text-red-400" title="Eliminar total">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </td>
                    `;
                    list.appendChild(tr);
                });

                document.getElementById('stat-total').innerText = snapshot.size;
                document.getElementById('stat-active').innerText = countActive;
                document.getElementById('stat-suspended').innerText = countSuspended;
                lucide.createIcons();
            });
        }

        // Crear nuevo cliente
        document.getElementById('tenantForm').onsubmit = async (e) => {
            e.preventDefault();
            const idRaw = document.getElementById('t_id').value.toLowerCase().replace(/[^a-z0-9]/g, '_');
            const data = {
                nombre: document.getElementById('t_nombre').value,
                plan: document.getElementById('t_plan').value,
                vencimiento: document.getElementById('t_fecha').value,
                estado: 'Activo',
                createdAt: new Date().toISOString()
            };

            try {
                // 1. Guardamos en el Panel Maestro
                await setDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', idRaw), data);
                
                // 2. IMPORTANTE: Creamos el documento de configuración en la DB del CLIENTE para que el sistema lo reconozca
                await setDoc(doc(db, 'artifacts', idRaw, 'public', 'data', 'usuarios', 'admin_data'), {
                    empresa: data.nombre,
                    estadoTenant: "Activo",
                    plan: data.plan
                }, { merge: true });

                closeModal('newTenantModal');
                alert(`Cliente Creado con éxito.\nEnlace: ${BASE_URL}?tenant=${idRaw}`);
            } catch (err) {
                alert("Error creando cliente: " + err.message);
            }
        };

        // Cambiar estado (Activar/Suspender)
        window.toggleTenantStatus = async (id, currentStatus) => {
            const newStatus = currentStatus === 'Activo' ? 'Suspendido' : 'Activo';
            if(!confirm(`¿Deseas cambiar el estado de ${id} a ${newStatus.toUpperCase()}?`)) return;

            try {
                // Actualizamos el maestro
                await updateDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id), { estado: newStatus });
                
                // Actualizamos la DB del cliente (para que su app se bloquee)
                await updateDoc(doc(db, 'artifacts', id, 'public', 'data', 'usuarios', 'admin_data'), { estadoTenant: newStatus });
            } catch (err) {
                alert("Error al actualizar: " + err.message);
            }
        };

        window.deleteTenant = async (id) => {
            if(!confirm(`⚠️ PELIGRO: Esto eliminará el registro del cliente ${id} en tu panel maestro. Los datos de sus préstamos no se borrarán pero perderás el control desde aquí. ¿Continuar?`)) return;
            await deleteDoc(doc(db, 'artifacts', APP_MASTER_ID, 'public', 'data', 'tenants', id));
        };

        window.copyURL = (id) => {
            const url = `${BASE_URL}?tenant=${id}`;
            navigator.clipboard.writeText(url);
            alert("Enlace copiado al portapapeles:\n" + url);
        };

    </script>
</body>
</html>
