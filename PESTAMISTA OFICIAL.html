<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cartera V6 - Optimizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .alert-prevencion { animation: pulse-amber 2s infinite; background-color: #f59e0b !important; }
        .alert-mora { animation: pulse-red 2s infinite; background-color: #dc2626 !important; }
        @keyframes pulse-amber { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .img-mini { width: 50px; height: 35px; object-fit: cover; border-radius: 4px; border: 1px solid #cbd5e1; }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-indigo-600">
            <h1 class="text-2xl font-bold text-center mb-6 text-slate-800">Panel de Control Privado</h1>
            <input type="text" id="username" placeholder="Usuario" class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-indigo-600">
            <input type="password" id="password" placeholder="Contraseña" class="w-full p-3 border rounded-lg mb-6 outline-none focus:ring-2 focus:ring-indigo-600">
            <button onclick="handleLogin()" class="w-full bg-indigo-700 text-white py-3 rounded-lg font-bold hover:bg-indigo-800 transition">Entrar</button>
            <p id="loginError" class="text-red-500 text-sm mt-4 text-center hidden">Credenciales Incorrectas</p>
        </div>
    </div>

    <!-- App -->
    <div id="app" class="hidden">
        <nav class="bg-indigo-900 text-white p-4 flex justify-between items-center shadow-lg sticky top-0 z-40">
            <span class="font-bold tracking-tight">SISTEMA DE CARTERA OPTIMIZADO</span>
            <button onclick="location.reload()" class="text-xs bg-indigo-800 px-3 py-1 rounded">Cerrar Sesión</button>
        </nav>

        <main class="p-4 max-w-6xl mx-auto">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Clientes Registrados</h2>
                    <p id="counter" class="text-sm text-slate-500 font-medium"></p>
                </div>
                <button onclick="openModal('addModal')" class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg font-bold shadow-md hover:bg-indigo-700 transition">+ Nuevo Cliente</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-slate-50 border-b text-[10px] uppercase text-slate-400 font-black">
                            <tr>
                                <th class="p-4">Datos del Cliente</th>
                                <th class="p-4">Registro</th>
                                <th class="p-4">Saldo / Interés</th>
                                <th class="p-4">Evidencia</th>
                                <th class="p-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Registro -->
    <div id="addModal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-slate-800">Registrar Préstamo</h3>
            <form id="loanForm" class="space-y-3">
                <input type="text" id="n_nombre" placeholder="Nombre Completo" class="w-full p-3 border rounded-lg" required>
                <input type="text" id="n_cedula" placeholder="Número de Cédula" class="w-full p-3 border rounded-lg" required>
                <input type="text" id="n_telefono" placeholder="WhatsApp (Ej: 50688888888)" class="w-full p-3 border rounded-lg" required>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="n_monto" placeholder="Monto Principal" class="p-3 border rounded-lg" required>
                    <input type="number" id="n_interes_pct" placeholder="% Interés" class="p-3 border rounded-lg" required>
                </div>
                <div class="grid grid-cols-2 gap-2 text-[10px] bg-slate-50 p-3 rounded-lg">
                    <div>
                        <label class="font-bold block mb-1">FOTO CÉDULA</label>
                        <input type="file" id="n_img_cedula" accept="image/*" class="w-full">
                    </div>
                    <div>
                        <label class="font-bold block mb-1">FOTO PRENDA</label>
                        <input type="file" id="n_img_prenda" accept="image/*" class="w-full">
                    </div>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal('addModal')" class="flex-1 py-3 font-bold text-slate-500">Cancelar</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-bold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Detalle -->
    <div id="editModal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] flex flex-col shadow-2xl">
            <div class="p-5 border-b flex justify-between items-center">
                <h3 id="edit_titulo" class="text-xl font-bold text-slate-800"></h3>
                <button onclick="closeModal('editModal')" class="text-2xl">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-50 p-4 rounded-xl border">
                        <label class="text-[10px] font-black text-slate-400 block mb-1">REAJUSTAR SALDO (₡)</label>
                        <input type="number" id="e_saldo" class="w-full p-2 border rounded font-bold text-indigo-700">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-xl border">
                        <label class="text-[10px] font-black text-slate-400 block mb-1">INTERÉS MENSUAL (%)</label>
                        <input type="number" id="e_interes_pct" class="w-full p-2 border rounded font-bold text-indigo-700">
                    </div>
                    <button onclick="updateAmounts()" class="col-span-2 bg-slate-800 text-white py-2 rounded-lg font-bold text-xs">APLICAR CAMBIOS MANUALES</button>
                </div>

                <div class="bg-emerald-50 p-5 rounded-xl border border-emerald-200">
                    <label class="block text-xs font-bold text-emerald-700 mb-2">REGISTRAR ABONO TOTAL (₡)</label>
                    <div class="flex gap-2">
                        <input type="number" id="abono_monto" class="flex-1 p-3 border rounded-lg border-emerald-300" placeholder="Monto entregado">
                        <button onclick="calculateAndAddPayment()" class="bg-emerald-600 text-white px-6 rounded-lg font-bold">ABONAR</button>
                    </div>
                </div>

                <div class="space-y-2">
                    <h4 class="text-xs font-black text-slate-400 uppercase">Historial de Pagos</h4>
                    <div id="historyBody" class="space-y-2 text-xs"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CREDENTIALS = { user: "admin", pass: "Carpi0_2026*" };
        let db = JSON.parse(localStorage.getItem('cartera_v6_db')) || [];
        let currentId = null;

        function handleLogin() {
            if(document.getElementById('username').value === CREDENTIALS.user && 
               document.getElementById('password').value === CREDENTIALS.pass) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                render();
            } else { document.getElementById('loginError').classList.remove('hidden'); }
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // Función astuta para comprimir imágenes y ahorrar espacio
        async function compressImage(file) {
            if (!file) return null;
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; // Resolución pequeña para ahorrar espacio
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // Calidad media
                    };
                };
            });
        }

        document.getElementById('loanForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const now = new Date();
            
            const nuevo = {
                id: Date.now(),
                nombre: document.getElementById('n_nombre').value,
                cedula: document.getElementById('n_cedula').value,
                telefono: document.getElementById('n_telefono').value,
                monto: parseFloat(document.getElementById('n_monto').value),
                saldo: parseFloat(document.getElementById('n_monto').value),
                interesPct: parseFloat(document.getElementById('n_interes_pct').value),
                fecha: now.toLocaleDateString('es-CR'),
                hora: now.toLocaleTimeString('es-CR', {hour:'2-digit', minute:'2-digit'}),
                diaPago: now.getDate(),
                imgCedula: await compressImage(document.getElementById('n_img_cedula').files[0]),
                imgPrenda: await compressImage(document.getElementById('n_img_prenda').files[0]),
                historial: []
            };

            db.push(nuevo);
            sync();
            closeModal('addModal');
            e.target.reset();
        });

        function render() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            document.getElementById('counter').innerText = `${db.length} Clientes en Cartera`;
            
            db.forEach(item => {
                const alerta = checkAlert(item.diaPago);
                const intMonto = (item.saldo * (item.interesPct / 100));
                
                let btnColor = "bg-emerald-500";
                if(alerta === 'prev') btnColor = "alert-prevencion";
                if(alerta === 'mora') btnColor = "alert-mora";

                body.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4">
                            <div class="font-bold text-slate-800">${item.nombre}</div>
                            <div class="text-[10px] text-slate-500">ID: ${item.cedula}</div>
                        </td>
                        <td class="p-4">
                            <div class="font-medium">${item.fecha}</div>
                            <div class="text-[10px] text-slate-400">${item.hora}</div>
                        </td>
                        <td class="p-4">
                            <div class="font-bold text-indigo-700">₡${item.saldo.toLocaleString()}</div>
                            <div class="text-[10px] text-emerald-600 font-bold">Interés: ₡${intMonto.toLocaleString()}</div>
                        </td>
                        <td class="p-4">
                            <div class="flex gap-1">
                                ${item.imgCedula ? `<img src="${item.imgCedula}" class="img-mini">` : ''}
                                ${item.imgPrenda ? `<img src="${item.imgPrenda}" class="img-mini">` : ''}
                            </div>
                        </td>
                        <td class="p-4 flex gap-2 justify-center">
                            <button onclick="openEdit(${item.id})" class="bg-slate-700 text-white px-3 py-1.5 rounded text-[10px] font-bold">GESTIÓN</button>
                            <button onclick="sendWA('${item.telefono}', '${item.nombre}', ${item.saldo}, ${intMonto})" 
                                    class="${btnColor} text-white px-3 py-1.5 rounded text-[10px] font-bold">WHATSAPP</button>
                            <button onclick="deleteClient(${item.id})" class="text-slate-300 hover:text-red-500">🗑️</button>
                        </td>
                    </tr>
                `;
            });
        }

        function checkAlert(diaRegistro) {
            const hoy = new Date();
            const diaHoy = hoy.getDate();
            if(diaHoy === diaRegistro - 1) return 'prev';
            if(diaHoy >= diaRegistro) return 'mora';
            return 'ok';
        }

        function openEdit(id) {
            currentId = id;
            const item = db.find(l => l.id === id);
            document.getElementById('edit_titulo').innerText = item.nombre;
            document.getElementById('e_saldo').value = item.saldo;
            document.getElementById('e_interes_pct').value = item.interesPct;
            
            const hBody = document.getElementById('historyBody');
            hBody.innerHTML = item.historial.length ? '' : '<p class="text-slate-400 italic">No hay pagos registrados</p>';
            item.historial.slice().reverse().forEach(h => {
                hBody.innerHTML += `
                    <div class="bg-slate-50 p-2 rounded flex justify-between border">
                        <span><b>${h.fecha}</b></span>
                        <span>Total: ₡${h.total.toLocaleString()}</span>
                        <span class="text-amber-600">Int: ₡${h.int.toLocaleString()}</span>
                        <span class="text-blue-600">Cap: ₡${h.cap.toLocaleString()}</span>
                        <span class="font-bold">Saldo: ₡${h.sFinal.toLocaleString()}</span>
                    </div>
                `;
            });
            openModal('editModal');
        }

        function calculateAndAddPayment() {
            const monto = parseFloat(document.getElementById('abono_monto').value);
            if(!monto || monto <= 0) return alert("Ingrese un monto válido");
            
            const item = db.find(l => l.id === currentId);
            const intMensual = (item.saldo * (item.interesPct / 100));
            
            let pInt = Math.min(monto, intMensual);
            let pCap = Math.max(0, monto - intMensual);
            
            item.saldo -= pCap;
            item.historial.push({
                fecha: new Date().toLocaleString('es-CR'),
                total: monto,
                int: pInt,
                cap: pCap,
                sFinal: item.saldo
            });
            
            sync();
            openEdit(currentId);
            document.getElementById('abono_monto').value = '';
        }

        function updateAmounts() {
            const item = db.find(l => l.id === currentId);
            item.saldo = parseFloat(document.getElementById('e_saldo').value);
            item.interesPct = parseFloat(document.getElementById('e_interes_pct').value);
            sync();
            alert("Montos actualizados.");
        }

        function deleteClient(id) {
            if(confirm("¿Eliminar este cliente de forma permanente? Esta acción no se puede deshacer.")) {
                db = db.filter(l => l.id !== id);
                sync();
            }
        }

        function sync() {
            try {
                localStorage.setItem('cartera_v6_db', JSON.stringify(db));
                render();
            } catch(e) {
                alert("ADVERTENCIA: La memoria del navegador está llegando a su límite. Por favor, elimine registros antiguos o use fotos de menor tamaño.");
            }
        }

        function sendWA(t, n, s, i) {
            const msg = `Estimado(a) ${n}. Le recordamos su saldo pendiente de ₡${s.toLocaleString()}. Interés mensual: ₡${i.toLocaleString()}. Quedamos a su disposición.`;
            window.open(`https://wa.me/${t}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
