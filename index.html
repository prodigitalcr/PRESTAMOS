<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Temporalmente No Disponible</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfd;
            color: #1e293b;
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-glow {
            filter: drop-shadow(0 0 8px rgba(0, 0, 0, 0.05));
            transition: transform 0.3s ease;
        }

        .logo-glow:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full text-center fade-in">
        <!-- Icono de Estado -->
        <div class="mb-8 flex justify-center">
            <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
            </div>
        </div>

        <!-- Mensaje Principal -->
        <h1 class="text-2xl font-semibold text-slate-800 mb-4 leading-tight">
            Estamos mejorando <br>tu experiencia
        </h1>
        
        <p class="text-slate-500 leading-relaxed mb-10">
            El acceso a la plataforma no está disponible momentáneamente por tareas de mantenimiento. Estaremos de vuelta en unos minutos.
        </p>

        <!-- Indicador de Actividad -->
        <div class="inline-flex items-center px-4 py-2 bg-white border border-slate-200 rounded-full shadow-sm mb-16">
            <span class="flex h-2 w-2 mr-3">
                <span class="animate-ping absolute inline-flex h-2 w-2 rounded-full bg-blue-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
            </span>
            <span class="text-[10px] font-bold text-slate-600 uppercase tracking-widest">Servicio en optimización</span>
        </div>

        <!-- Sello de Soporte (PRO.DIGITAL) -->
        <div class="mt-8 flex flex-col items-center border-t border-slate-100 pt-10">
            <span class="text-[9px] uppercase tracking-[0.2em] text-slate-400 font-bold mb-4">Tecnología y Soporte por</span>
            <div class="flex items-center space-x-2 logo-glow">
                <!-- Representación visual del Sello PRO.DIGITAL -->
                <div class="bg-slate-900 text-white px-3 py-1 rounded text-sm font-black tracking-tighter">
                    PRO.DIGITAL
                </div>
            </div>
            <p class="mt-4 text-[11px] text-slate-400 italic">
                © 2024 Todos los derechos reservados.
            </p>
        </div>
    </div>

</body>
</html>
